<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kwiatki vs Zombiaki 🌻🧟</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#1a2410; color:#eee; font-family:'Segoe UI',system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:10px;
    user-select:none; -webkit-user-select:none;
  }
  h1 { font-size:20px; margin:4px 0 8px; color:#ffd94a; text-shadow:2px 2px 0 #000; letter-spacing:1px; }
  #topbar {
    width:970px; max-width:100%; display:flex; align-items:stretch; gap:8px;
    background:#3b2b1a; border:3px solid #6b4c2a; border-radius:10px; padding:6px; margin-bottom:8px;
  }
  #sunbox {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:#2a1f12; border-radius:8px; padding:4px 10px; min-width:80px;
  }
  #sunbox .icon { font-size:26px; }
  #sunCount { font-size:20px; font-weight:bold; color:#ffd94a; }
  #cards { display:flex; gap:5px; flex:1; flex-wrap:wrap; }
  .card {
    position:relative; width:62px; height:74px;
    background:#54401f; border:2px solid #8a6a35; border-radius:8px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden;
    transition:transform .08s;
  }
  .card:hover { transform:scale(1.05); }
  .card .em { font-size:30px; line-height:1; }
  .card .cost { font-size:12px; font-weight:bold; color:#ffd94a; }
  .card.sel { border-color:#7cff5e; box-shadow:0 0 10px #7cff5e; }
  .card.poor .em, .card.poor .cost { opacity:.35; }
  .card .cd {
    position:absolute; left:0; bottom:0; width:100%; height:0%;
    background:rgba(0,0,0,.72); pointer-events:none;
  }
  #tools { display:flex; flex-direction:column; gap:4px; justify-content:center; }
  .tool {
    background:#54401f; border:2px solid #8a6a35; border-radius:8px; color:#eee;
    font-size:13px; padding:3px 8px; cursor:pointer; white-space:nowrap;
  }
  .tool.sel { border-color:#ff6a5e; box-shadow:0 0 8px #ff6a5e; }
  #waveinfo {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-width:130px; background:#2a1f12; border-radius:8px; padding:4px 8px; gap:4px;
  }
  #waveLabel { font-size:14px; font-weight:bold; color:#ffb14a; }
  #waveBarWrap { width:110px; height:10px; background:#111; border-radius:5px; overflow:hidden; }
  #waveBar { height:100%; width:0%; background:linear-gradient(90deg,#5eff6a,#ffd94a); transition:width .3s; }
  #killLabel { font-size:11px; color:#aaa; }
  #stage { position:relative; width:970px; max-width:100%; }
  canvas {
    width:100%; display:block; background:#274d1c; border:4px solid #6b4c2a; border-radius:10px;
    cursor:crosshair;
  }
  #overlay {
    position:absolute; inset:0; background:rgba(10,15,5,.88); border-radius:10px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:20px; z-index:5;
  }
  #overlay.hidden { display:none; }
  #overlay h2 { font-size:38px; color:#ffd94a; text-shadow:3px 3px 0 #000; margin-bottom:10px; }
  #overlay p { margin:4px 0; font-size:15px; color:#ddd; }
  #overlay .feat { color:#9fe870; font-size:14px; }
  #overlay button {
    margin-top:16px; font-size:22px; font-weight:bold; padding:10px 34px; cursor:pointer;
    background:linear-gradient(#7cd946,#4a9e22); color:#fff; border:3px solid #2d6212;
    border-radius:10px; text-shadow:1px 1px 0 #000; margin-left:6px; margin-right:6px;
  }
  #overlay button:hover { filter:brightness(1.15); }
  #overlay button.alt { background:linear-gradient(#d9a746,#9e7422); border-color:#62480f; font-size:17px; }
  #hint { font-size:12px; color:#8a9a78; margin-top:6px; text-align:center; }
</style>
</head>
<body>
<h1>🌻 KWIATKI vs ZOMBIAKI 🧟</h1>

<div id="topbar">
  <div id="sunbox"><span class="icon">☀️</span><span id="sunCount">150</span></div>
  <div id="cards"></div>
  <div id="tools">
    <button class="tool" id="shovelBtn">🪏 Łopata</button>
    <button class="tool" id="upBtn">⭐ Ulepsz (150)</button>
    <button class="tool" id="muteBtn">🔊 Dźwięk</button>
  </div>
  <div id="waveinfo">
    <span id="waveLabel">Fala –</span>
    <div id="waveBarWrap"><div id="waveBar"></div></div>
    <span id="killLabel">☠️ 0</span>
  </div>
</div>

<div id="stage">
  <canvas id="cv" width="970" height="480"></canvas>
  <div id="overlay"></div>
</div>
<div id="hint">Klikaj ☀️ i power-upy na planszy · Wybierz kartę i kliknij pole, by sadzić · PPM anuluje · [P] pauza</div>

<script>
'use strict';

// ====== STAŁE PLANSZY ======
const COLS=9, ROWS=5, CW=100, CH=96, GX=70;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height;
const WIN_WAVE=10, UPGRADE_COST=150;

// ====== DEFINICJE ROŚLIN ======
const PLANTS={
  sunflower:{name:'Słonecznik', em:'🌻', cost:50,  hp:80,  cd:5,  desc:'produkuje słońce'},
  pea:      {name:'Groszek',    em:'🫛', cost:100, hp:100, cd:5,  desc:'strzela groszkiem'},
  ice:      {name:'Mrozak',     em:'❄️', cost:175, hp:100, cd:6,  desc:'spowalnia zombie'},
  nut:      {name:'Orzech',     em:'🥜', cost:50,  hp:600, cd:18, desc:'twarda ściana'},
  cherry:   {name:'Wiśnia',     em:'🍒', cost:150, hp:100, cd:25, desc:'eksploduje 3x3'},
  tesla:    {name:'Tesla',      em:'⚡', cost:200, hp:100, cd:10, desc:'razi łańcuchem'},
};

// ====== DEFINICJE ZOMBIE ======
const ZTYPES={
  normal:{hp:100,  speed:11, em:'🧟', badge:'',   size:54},
  cone:  {hp:230,  speed:11, em:'🧟', badge:'🔺', size:54},
  bucket:{hp:400,  speed:10, em:'🧟', badge:'🪣', size:54},
  runner:{hp:70,   speed:26, em:'🧟', badge:'💨', size:50},
  boss:  {hp:1600, speed:7,  em:'👹', badge:'👑', size:84},
};

// ====== DŹWIĘK ======
let audioCtx=null, muted=false;
function beep(freq,dur,type='square',vol=0.05){
  if(muted) return;
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

// ====== STAN GRY ======
let S=null;
function newState(){
  return {
    state:'menu',        // menu | prewave | wave | pause | over | win
    endless:false,
    sun:150, wave:0, preT:0,
    grid:Array.from({length:ROWS},()=>Array(COLS).fill(null)),
    zombies:[], projectiles:[], suns:[], pickups:[], floaters:[], particles:[], zaps:[],
    mowers:Array.from({length:ROWS},(_,r)=>({row:r,x:GX-52,active:false,used:false,gone:false})),
    cds:{}, selected:null, shovel:false, upgrading:false,
    queue:[], spawnT:0, totalWave:0, killedWave:0,
    skyT:6, sunRain:0, sunRainT:0,
    eventT:40, overT:0,
    combo:0, comboT:0, maxCombo:0, kills:0,
    banner:null, mouse:{x:-1,y:-1}, prevState:'wave',
  };
}

// ====== UI: KARTY ======
const cardsDiv=document.getElementById('cards');
const cardEls={};
for(const key of Object.keys(PLANTS)){
  const p=PLANTS[key];
  const d=document.createElement('div');
  d.className='card'; d.title=`${p.name} – ${p.desc}`;
  d.innerHTML=`<span class="em">${p.em}</span><span class="cost">${p.cost}</span><div class="cd"></div>`;
  d.onclick=()=>{ if(!S||S.state==='menu') return; selectCard(key); };
  cardsDiv.appendChild(d); cardEls[key]=d;
}
function selectCard(key){
  const p=PLANTS[key];
  if((S.cds[key]||0)>0 || S.sun<p.cost) { beep(160,.1); return; }
  S.selected = (S.selected===key)? null : key;
  S.shovel=false; S.upgrading=false;
  beep(700,.06,'triangle');
}

const shovelBtn=document.getElementById('shovelBtn');
const upBtn=document.getElementById('upBtn');
const muteBtn=document.getElementById('muteBtn');
shovelBtn.onclick=()=>{ if(!S) return; S.shovel=!S.shovel; S.upgrading=false; S.selected=null; };
upBtn.onclick=()=>{ if(!S) return; S.upgrading=!S.upgrading; S.shovel=false; S.selected=null; };
muteBtn.onclick=()=>{ muted=!muted; muteBtn.textContent=muted?'🔇 Cisza':'🔊 Dźwięk'; };

// ====== POMOCNICZE ======
const rnd=Math.random;
function cellX(c){ return GX+c*CW+CW/2; }
function cellY(r){ return r*CH+CH/2; }
function floater(x,y,text,color='#ffd94a',size=18){ S.floaters.push({x,y,text,color,size,t:1.2}); }
function banner(text){ S.banner={text,t:2.6}; }
function boom(x,y,n,color){ for(let i=0;i<n;i++) S.particles.push({x,y,vx:(rnd()-.5)*260,vy:(rnd()-.5)*260,t:.5+rnd()*.4,color}); }

// ====== SŁOŃCE ======
function dropSkySun(){
  const x=GX+30+rnd()*(COLS*CW-60);
  S.suns.push({x,y:-30,targetY:80+rnd()*(H-140),value:25,t:12});
}
function plantSun(x,y,value){
  S.suns.push({x:x+(rnd()-.5)*30,y:y-10,targetY:y+10,value,t:10});
}

// ====== FALE ======
function buildQueue(n){
  const count=4+Math.round(n*2.2);
  const pool=[];
  pool.push({t:'normal',w:10});
  if(n>=2) pool.push({t:'cone',w:4+n});
  if(n>=3) pool.push({t:'runner',w:3+n*0.5});
  if(n>=4) pool.push({t:'bucket',w:2+n*0.7});
  const total=pool.reduce((a,p)=>a+p.w,0);
  const q=[];
  for(let i=0;i<count;i++){
    let r=rnd()*total;
    for(const p of pool){ r-=p.w; if(r<=0){ q.push(p.t); break; } }
  }
  if(n%5===0) q.push('boss');
  return q;
}
function startWave(){
  S.wave++;
  S.queue=buildQueue(S.wave);
  S.totalWave=S.queue.length; S.killedWave=0;
  S.spawnT=1.5; S.state='wave';
  if(!S.endless && S.wave===WIN_WAVE) banner('☠️ OSTATNIA FALA! ☠️');
  else if(S.wave%5===0) banner(`Fala ${S.wave} — BOSS! 👹`);
  else banner(`Fala ${S.wave} nadchodzi!`);
  beep(220,.3,'sawtooth',.08);
}
function spawnZombie(type){
  const zt=ZTYPES[type];
  const hpScale = type==='boss' ? (1 + (S.wave-5)*0.18) : (1 + Math.max(0,S.wave-6)*0.07);
  const row=Math.floor(rnd()*ROWS);
  S.zombies.push({
    type, row, x:W+20+rnd()*40, hp:zt.hp*hpScale, maxHp:zt.hp*hpScale,
    speed:zt.speed*(0.9+rnd()*0.2), slowT:0, slowAmt:0, frozenT:0, dead:false, wob:rnd()*6.28,
  });
}

// ====== ZOMBIE: OBRAŻENIA / ŚMIERĆ ======
function damageZombie(z,dmg){
  if(z.dead) return;
  z.hp-=dmg;
  if(z.hp<=0) killZombie(z);
}
function killZombie(z){
  z.dead=true; S.kills++; S.killedWave++;
  const cx=z.x, cy=cellY(z.row);
  boom(cx,cy,10,'#8fce6e');
  beep(180,.12,'square',.06);
  // COMBO (autorski dodatek)
  S.combo++; S.comboT=2.5;
  if(S.combo>S.maxCombo) S.maxCombo=S.combo;
  if(S.combo>=2){
    const bonus=Math.min(S.combo*3,30);
    S.sun+=bonus;
    floater(cx,cy-30,`COMBO x${S.combo} +☀️${bonus}`,'#7cff5e',16);
  }
  // POWER-UPY (autorski dodatek)
  if(z.type==='boss'){
    for(let i=0;i<3;i++) dropPickup(cx+(i-1)*45,cy,z.row);
    banner('👹 BOSS POKONANY!');
  } else if(rnd()<0.10){
    dropPickup(cx,cy,z.row);
  }
}
function dropPickup(x,y,row){
  const types=['sun','freeze','bomb'];
  const type=types[Math.floor(rnd()*types.length)];
  S.pickups.push({x:Math.min(Math.max(x,GX+20),W-20),y,row,type,t:9});
}
function usePickup(pk){
  if(pk.type==='sun'){ S.sun+=75; floater(pk.x,pk.y,'+☀️75'); beep(1100,.12,'sine',.08); }
  else if(pk.type==='freeze'){
    for(const z of S.zombies) if(!z.dead) z.frozenT=4;
    banner('🧊 WIELKIE ZAMROŻENIE!'); beep(500,.35,'sine',.08);
  }
  else if(pk.type==='bomb'){
    for(const z of S.zombies) if(!z.dead && z.row===pk.row) damageZombie(z,400);
    boom(pk.x,pk.y,26,'#ff8844'); banner('💣 BUM! Cała linia!'); beep(90,.4,'square',.12);
  }
}

// ====== ROŚLINY ======
function placePlant(key,r,c){
  const def=PLANTS[key];
  const p={type:key,row:r,col:c,hp:def.hp,maxHp:def.hp,up:false,
           sunT:5+rnd()*3, shootT:0.5, zapT:1.5, fuse:0.9};
  S.grid[r][c]=p;
  S.sun-=def.cost; S.cds[key]=def.cd;
  S.selected=null;
  boom(cellX(c),cellY(r),6,'#c9f29b');
  beep(520,.08,'triangle',.06);
}
function upgradePlant(p){
  if(p.up || p.type==='cherry'){ floater(cellX(p.col),cellY(p.row),'Nie można!','#ff7a5e',14); return; }
  if(S.sun<UPGRADE_COST){ floater(cellX(p.col),cellY(p.row),'Za mało słońca!','#ff7a5e',14); return; }
  S.sun-=UPGRADE_COST; p.up=true;
  if(p.type==='nut'){ p.maxHp=1200; p.hp=1200; }
  floater(cellX(p.col),cellY(p.row)-20,'⭐ ULEPSZONO!','#ffd94a',16);
  boom(cellX(p.col),cellY(p.row),12,'#ffd94a');
  beep(880,.15,'triangle',.08);
  S.upgrading=false;
}
function zombieAhead(row,px){
  return S.zombies.some(z=>!z.dead&&z.row===row&&z.x>px-10&&z.x<W+10);
}
function fireProjectile(p){
  const isIce=p.type==='ice';
  const dmg=isIce?(p.up?30:15):(p.up?40:20);
  S.projectiles.push({row:p.row,x:cellX(p.col)+18,dmg,ice:isIce,up:p.up});
  beep(isIce?980:840,.04,'triangle',.02);
}
function teslaZap(p){
  const px=cellX(p.col);
  const range=380, maxT=p.up?5:3, dmg=p.up?70:45;
  const targets=S.zombies.filter(z=>!z.dead&&z.row===p.row&&z.x>px-20&&z.x<px+range)
                         .sort((a,b)=>a.x-b.x).slice(0,maxT);
  if(!targets.length) return false;
  const pts=targets.map(z=>({x:z.x,y:cellY(z.row)-10}));
  S.zaps.push({x0:px,y0:cellY(p.row)-20,pts,t:0.15});
  for(const z of targets) damageZombie(z,dmg);
  beep(600,.1,'sawtooth',.05);
  return true;
}
function explodeCherry(p){
  const cx=cellX(p.col), cy=cellY(p.row);
  for(const z of S.zombies){
    if(z.dead) continue;
    if(Math.abs(z.row-p.row)<=1 && Math.abs(z.x-cx)<=CW*1.5) damageZombie(z,900);
  }
  boom(cx,cy,34,'#ff5c33');
  S.grid[p.row][p.col]=null;
  beep(70,.5,'square',.14);
}

// ====== WYDARZENIA LOSOWE (autorski dodatek) ======
function randomEvent(){
  const r=rnd();
  if(r<0.34){
    banner('☀️ DESZCZ SŁOŃCA!');
    S.sunRain=6; S.sunRainT=0;
  } else if(r<0.67){
    banner('🧟 SZAŁ HORDY!');
    for(let i=0;i<3;i++) spawnZombie(rnd()<0.5?'normal':'runner');
    S.totalWave+=3;
  } else {
    banner('⚡ PRZEŁADOWANIE ROŚLIN!');
    S.overT=8;
  }
}

// ====== PORAŻKA / ZWYCIĘSTWO ======
function gameOver(){
  S.state='over';
  showOverlay(`
    <h2>🧠 ZOMBIAKI ZJADŁY CI MÓZG!</h2>
    <p>Dotarłeś do fali <b>${S.wave}</b> · Pokonane zombie: <b>${S.kills}</b> · Max combo: <b>x${S.maxCombo}</b></p>
    <button onclick="startGame()">🔄 Jeszcze raz</button>
  `);
  beep(110,.8,'sawtooth',.1);
}
function victory(){
  S.state='win';
  showOverlay(`
    <h2>🏆 ZWYCIĘSTWO!</h2>
    <p>Obroniłeś ogród przez <b>${WIN_WAVE}</b> fal!</p>
    <p>Pokonane zombie: <b>${S.kills}</b> · Max combo: <b>x${S.maxCombo}</b></p>
    <button onclick="startGame()">🔄 Od nowa</button>
    <button class="alt" onclick="goEndless()">♾️ Graj dalej (endless)</button>
  `);
  beep(660,.2,'triangle',.1); setTimeout(()=>beep(880,.3,'triangle',.1),200);
}
function goEndless(){
  S.endless=true; S.state='prewave'; S.preT=6;
  hideOverlay(); banner('♾️ TRYB ENDLESS!');
}

// ====== OVERLAY ======
const overlayDiv=document.getElementById('overlay');
function showOverlay(html){ overlayDiv.innerHTML=html; overlayDiv.classList.remove('hidden'); }
function hideOverlay(){ overlayDiv.classList.add('hidden'); }
function showMenu(){
  showOverlay(`
    <h2>🌻 KWIATKI vs ZOMBIAKI 🧟</h2>
    <p>Klasyka tower-defense 1:1 + nasze autorskie dodatki:</p>
    <p class="feat">⚡ Roślina TESLA (łańcuch błyskawic) · ⭐ ULEPSZANIE roślin</p>
    <p class="feat">🔥 SYSTEM COMBO (szybkie zabójstwa = bonus słońca)</p>
    <p class="feat">🎁 POWER-UPY z zombie (☀️ / 🧊 zamrożenie / 💣 bomba liniowa)</p>
    <p class="feat">🎲 LOSOWE WYDARZENIA · 👹 BOSSOWIE co 5 fal · ♾️ tryb endless</p>
    <p style="margin-top:10px">Przetrwaj <b>${WIN_WAVE} fal</b>. Zbieraj ☀️, sadź rośliny, broń kosiarek!</p>
    <button onclick="startGame()">▶ GRAJ</button>
  `);
}
window.startGame=function(){
  S=newState();
  S.state='prewave'; S.preT=5;
  hideOverlay();
  banner('Przygotuj obronę!');
};
window.goEndless=goEndless;

// ====== WEJŚCIE ======
function canvasPos(e){
  const rect=cv.getBoundingClientRect();
  return { x:(e.clientX-rect.left)*(W/rect.width), y:(e.clientY-rect.top)*(H/rect.height) };
}
cv.addEventListener('mousemove',e=>{ if(!S) return; const p=canvasPos(e); S.mouse=p; });
cv.addEventListener('contextmenu',e=>{
  e.preventDefault();
  if(S){ S.selected=null; S.shovel=false; S.upgrading=false; }
});
cv.addEventListener('click',e=>{
  if(!S || S.state==='menu'||S.state==='over'||S.state==='win'||S.state==='pause') return;
  const {x,y}=canvasPos(e);
  // 1) słońca
  for(let i=S.suns.length-1;i>=0;i--){
    const s=S.suns[i];
    if(Math.hypot(s.x-x,s.y-y)<34){
      S.sun+=s.value; floater(s.x,s.y,'+'+s.value);
      S.suns.splice(i,1); beep(1200,.08,'sine',.06);
      return;
    }
  }
  // 2) power-upy
  for(let i=S.pickups.length-1;i>=0;i--){
    const pk=S.pickups[i];
    if(Math.hypot(pk.x-x,pk.y-y)<32){ usePickup(pk); S.pickups.splice(i,1); return; }
  }
  // 3) siatka
  const c=Math.floor((x-GX)/CW), r=Math.floor(y/CH);
  if(c<0||c>=COLS||r<0||r>=ROWS) return;
  const existing=S.grid[r][c];
  if(S.shovel){
    if(existing){ S.grid[r][c]=null; boom(cellX(c),cellY(r),6,'#a8875a'); beep(300,.08); }
    S.shovel=false; return;
  }
  if(S.upgrading){
    if(existing) upgradePlant(existing);
    return;
  }
  if(S.selected){
    const def=PLANTS[S.selected];
    if(existing){ floater(cellX(c),cellY(r),'Zajęte!','#ff7a5e',14); return; }
    if(S.sun<def.cost||(S.cds[S.selected]||0)>0){ S.selected=null; return; }
    placePlant(S.selected,r,c);
  }
});
document.addEventListener('keydown',e=>{
  if(!S) return;
  if(e.key==='p'||e.key==='P'){
    if(S.state==='wave'||S.state==='prewave'){ S.prevState=S.state; S.state='pause'; showOverlay('<h2>⏸️ PAUZA</h2><p>Naciśnij P, aby kontynuować</p>'); }
    else if(S.state==='pause'){ S.state=S.prevState; hideOverlay(); }
  }
  if(e.key==='Escape'){ S.selected=null; S.shovel=false; S.upgrading=false; }
});

// ====== AKTUALIZACJA ======
function update(dt){
  if(!S || S.state==='menu'||S.state==='pause'||S.state==='over'||S.state==='win') return;

  if(S.state==='prewave'){
    S.preT-=dt;
    if(S.preT<=0) startWave();
  }

  // cooldowny kart
  for(const k in S.cds) if(S.cds[k]>0) S.cds[k]-=dt;

  // słońce z nieba
  S.skyT-=dt;
  if(S.skyT<=0){ dropSkySun(); S.skyT=7+rnd()*4; }
  // deszcz słońca
  if(S.sunRain>0){
    S.sunRainT-=dt;
    if(S.sunRainT<=0){ dropSkySun(); S.sunRain--; S.sunRainT=0.5; }
  }
  // spadanie / życie słońc
  for(let i=S.suns.length-1;i>=0;i--){
    const s=S.suns[i];
    if(s.y<s.targetY) s.y=Math.min(s.y+90*dt,s.targetY);
    s.t-=dt;
    if(s.t<=0) S.suns.splice(i,1);
  }

  // przeładowanie
  if(S.overT>0) S.overT-=dt;
  const rateMul=S.overT>0?2:1;

  // rośliny
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p=S.grid[r][c]; if(!p) continue;
    if(p.type==='sunflower'){
      p.sunT-=dt;
      if(p.sunT<=0){ plantSun(cellX(c),cellY(r),p.up?50:25); p.sunT=11+rnd()*3; }
    } else if(p.type==='pea'||p.type==='ice'){
      p.shootT-=dt*rateMul;
      if(p.shootT<=0 && zombieAhead(r,cellX(c))){ fireProjectile(p); p.shootT=1.4; }
    } else if(p.type==='tesla'){
      p.zapT-=dt*rateMul;
      if(p.zapT<=0){ if(teslaZap(p)) p.zapT=2.6; else p.zapT=0.3; }
    } else if(p.type==='cherry'){
      p.fuse-=dt;
      if(p.fuse<=0) explodeCherry(p);
    }
  }

  // pociski
  for(let i=S.projectiles.length-1;i>=0;i--){
    const pr=S.projectiles[i];
    pr.x+=320*dt;
    if(pr.x>W+20){ S.projectiles.splice(i,1); continue; }
    let hit=null;
    for(const z of S.zombies){
      if(z.dead||z.row!==pr.row) continue;
      if(Math.abs(z.x-pr.x)<28 && (!hit||z.x<hit.x)) hit=z;
    }
    if(hit){
      damageZombie(hit,pr.dmg);
      if(pr.ice){ hit.slowT=pr.up?4:3; hit.slowAmt=pr.up?0.6:0.4; }
      boom(pr.x,cellY(pr.row)-10,3,pr.ice?'#9fe0ff':'#a8e05a');
      S.projectiles.splice(i,1);
    }
  }

  // zombie
  for(const z of S.zombies){
    if(z.dead) continue;
    z.wob+=dt*6;
    if(z.frozenT>0){ z.frozenT-=dt; continue; }
    if(z.slowT>0) z.slowT-=dt;
    const sp=z.speed*(z.slowT>0?(1-z.slowAmt):1);
    const frontCol=Math.floor((z.x-24-GX)/CW);
    let eating=false;
    if(frontCol>=0&&frontCol<COLS){
      const p=S.grid[z.row][frontCol];
      if(p){
        eating=true;
        p.hp-=(z.type==='boss'?90:35)*dt;
        if(p.hp<=0){ S.grid[z.row][frontCol]=null; boom(cellX(frontCol),cellY(z.row),8,'#7a9a4e'); beep(240,.1); }
      }
    }
    if(!eating) z.x-=sp*dt;
    // kosiarka
    if(z.x<GX+6){
      const m=S.mowers[z.row];
      if(!m.used){ m.used=true; m.active=true; beep(400,.3,'sawtooth',.1); }
      else if(z.x<GX-40){ gameOver(); return; }
    }
  }

  // kosiarki
  for(const m of S.mowers){
    if(!m.active||m.gone) continue;
    m.x+=330*dt;
    for(const z of S.zombies){
      if(z.dead||z.row!==m.row) continue;
      if(z.x<m.x+42){
        if(z.type==='boss') damageZombie(z,1500);
        else killZombie(z);
      }
    }
    if(m.x>W+60){ m.active=false; m.gone=true; }
  }

  // usuń martwych
  S.zombies=S.zombies.filter(z=>!z.dead);

  // combo timeout
  if(S.comboT>0){ S.comboT-=dt; if(S.comboT<=0) S.combo=0; }

  // pickupy
  for(let i=S.pickups.length-1;i>=0;i--){
    S.pickups[i].t-=dt;
    if(S.pickups[i].t<=0) S.pickups.splice(i,1);
  }

  // spawnowanie fali
  if(S.state==='wave'){
    if(S.queue.length){
      S.spawnT-=dt;
      if(S.spawnT<=0){
        spawnZombie(S.queue.shift());
        const base=Math.max(1.1,3.4-S.wave*0.16);
        S.spawnT=base*(0.6+rnd()*0.8);
      }
    } else if(!S.zombies.length){
      if(!S.endless && S.wave>=WIN_WAVE){ victory(); return; }
      S.state='prewave'; S.preT=7;
    }
    // wydarzenia losowe
    if(S.wave>=2){
      S.eventT-=dt;
      if(S.eventT<=0){ randomEvent(); S.eventT=35+rnd()*20; }
    }
  }

  // efekty
  for(let i=S.floaters.length-1;i>=0;i--){
    const f=S.floaters[i]; f.t-=dt; f.y-=30*dt;
    if(f.t<=0) S.floaters.splice(i,1);
  }
  for(let i=S.particles.length-1;i>=0;i--){
    const p=S.particles[i]; p.t-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=200*dt;
    if(p.t<=0) S.particles.splice(i,1);
  }
  for(let i=S.zaps.length-1;i>=0;i--){
    S.zaps[i].t-=dt;
    if(S.zaps[i].t<=0) S.zaps.splice(i,1);
  }
  if(S.banner){ S.banner.t-=dt; if(S.banner.t<=0) S.banner=null; }
}

// ====== RYSOWANIE ======
function draw(){
  ctx.clearRect(0,0,W,H);
  // pas domu
  ctx.fillStyle='#4a3a26'; ctx.fillRect(0,0,GX,H);
  ctx.fillStyle='#3a2d1c';
  for(let r=0;r<ROWS;r++) ctx.fillRect(0,r*CH+CH-6,GX,3);
  // trawa
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    ctx.fillStyle=(r+c)%2===0?'#77b255':'#88c766';
    ctx.fillRect(GX+c*CW,r*CH,CW,CH);
  }
  if(!S){ return; }

  // podgląd sadzenia
  if(S.selected&&S.mouse.x>=GX){
    const c=Math.floor((S.mouse.x-GX)/CW), r=Math.floor(S.mouse.y/CH);
    if(c>=0&&c<COLS&&r>=0&&r<ROWS&&!S.grid[r][c]){
      ctx.globalAlpha=0.45;
      ctx.font='52px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(PLANTS[S.selected].em,cellX(c),cellY(r));
      ctx.globalAlpha=1;
    }
  }

  // kosiarki
  ctx.font='34px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const m of S.mowers){
    if(m.gone&&!m.active) continue;
    ctx.fillText('🚜',m.x+20,cellY(m.row)+18);
  }

  // rośliny
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p=S.grid[r][c]; if(!p) continue;
    const x=cellX(c), y=cellY(r);
    ctx.globalAlpha=p.type==='nut'?Math.max(0.45,p.hp/p.maxHp):1;
    ctx.font='50px serif';
    ctx.fillText(PLANTS[p.type].em,x,y);
    ctx.globalAlpha=1;
    if(p.up){ ctx.font='18px serif'; ctx.fillText('⭐',x+26,y-26); }
    if(p.hp<p.maxHp){
      ctx.fillStyle='#300'; ctx.fillRect(x-22,y-40,44,5);
      ctx.fillStyle='#5eff6a'; ctx.fillRect(x-22,y-40,44*Math.max(0,p.hp/p.maxHp),5);
    }
  }

  // zombie
  for(const z of S.zombies){
    const zt=ZTYPES[z.type];
    const y=cellY(z.row)+(z.type==='boss'?-8:4)+Math.sin(z.wob)*2;
    ctx.font=zt.size+'px serif';
    if(z.frozenT>0){ ctx.globalAlpha=0.7; }
    ctx.fillText(zt.em,z.x,y);
    ctx.globalAlpha=1;
    if(zt.badge){ ctx.font='20px serif'; ctx.fillText(zt.badge,z.x,y-zt.size*0.55); }
    if(z.frozenT>0){ ctx.font='18px serif'; ctx.fillText('🧊',z.x-20,y-20); }
    // pasek hp
    const bw=z.type==='boss'?70:40;
    ctx.fillStyle='#300'; ctx.fillRect(z.x-bw/2,y-zt.size*0.62-8,bw,5);
    ctx.fillStyle=z.slowT>0?'#7fd8ff':'#ff5c5c';
    ctx.fillRect(z.x-bw/2,y-zt.size*0.62-8,bw*Math.max(0,z.hp/z.maxHp),5);
  }

  // pociski
  for(const pr of S.projectiles){
    ctx.beginPath();
    ctx.arc(pr.x,cellY(pr.row)-12,pr.up?9:7,0,7);
    ctx.fillStyle=pr.ice?'#7fd8ff':'#6ecb3c';
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.stroke();
  }

  // błyskawice tesli
  for(const zp of S.zaps){
    ctx.strokeStyle='#ffe95e'; ctx.lineWidth=3;
    let px=zp.x0, py=zp.y0;
    for(const pt of zp.pts){
      ctx.beginPath(); ctx.moveTo(px,py);
      const mx=(px+pt.x)/2+(rnd()-.5)*16, my=(py+pt.y)/2+(rnd()-.5)*16;
      ctx.lineTo(mx,my); ctx.lineTo(pt.x,pt.y); ctx.stroke();
      px=pt.x; py=pt.y;
    }
    ctx.lineWidth=1;
  }

  // cząsteczki
  for(const p of S.particles){
    ctx.globalAlpha=Math.max(0,p.t*2);
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-3,p.y-3,6,6);
  }
  ctx.globalAlpha=1;

  // power-upy
  for(const pk of S.pickups){
    const pulse=1+Math.sin(Date.now()/150)*0.1;
    ctx.beginPath(); ctx.arc(pk.x,pk.y,24*pulse,0,7);
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fill();
    ctx.font=Math.round(30*pulse)+'px serif';
    ctx.fillText(pk.type==='sun'?'💰':pk.type==='freeze'?'🧊':'💣',pk.x,pk.y);
    if(pk.t<3&&Math.floor(pk.t*6)%2===0) { /* miganie przed zniknięciem */ }
  }

  // słońca
  for(const s of S.suns){
    const pulse=1+Math.sin(Date.now()/200+s.x)*0.08;
    ctx.font=Math.round(40*pulse)+'px serif';
    ctx.globalAlpha=s.t<2?Math.max(0.25,s.t/2):1;
    ctx.fillText('☀️',s.x,s.y);
    ctx.globalAlpha=1;
  }

  // floatery
  for(const f of S.floaters){
    ctx.globalAlpha=Math.min(1,f.t*2);
    ctx.font='bold '+f.size+'px sans-serif';
    ctx.fillStyle='#000'; ctx.fillText(f.text,f.x+1,f.y+1);
    ctx.fillStyle=f.color; ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;

  // combo HUD
  if(S.combo>=2){
    ctx.font='bold 22px sans-serif'; ctx.textAlign='right';
    ctx.fillStyle='#000'; ctx.fillText(`🔥 COMBO x${S.combo}`,W-14,30);
    ctx.fillStyle='#7cff5e'; ctx.fillText(`🔥 COMBO x${S.combo}`,W-15,29);
    ctx.textAlign='center';
  }
  // przeładowanie HUD
  if(S.overT>0){
    ctx.font='bold 16px sans-serif'; ctx.textAlign='right';
    ctx.fillStyle='#ffe95e'; ctx.fillText(`⚡ ${Math.ceil(S.overT)}s`,W-15,54);
    ctx.textAlign='center';
  }

  // banner
  if(S.banner){
    ctx.globalAlpha=Math.min(1,S.banner.t);
    ctx.font='bold 40px sans-serif'; ctx.textAlign='center';
    ctx.fillStyle='#000'; ctx.fillText(S.banner.text,W/2+2,H/2-58);
    ctx.fillStyle='#ffd94a'; ctx.fillText(S.banner.text,W/2,H/2-60);
    ctx.globalAlpha=1;
  }
  // odliczanie prewave
  if(S.state==='prewave'){
    ctx.font='bold 22px sans-serif';
    ctx.fillStyle='#fff';
    ctx.fillText(`Fala ${S.wave+1} za ${Math.ceil(S.preT)}s...`,W/2,40);
  }
}

// ====== UI DOM ======
function updateUI(){
  if(!S) return;
  document.getElementById('sunCount').textContent=S.sun;
  for(const key in cardEls){
    const el=cardEls[key], def=PLANTS[key];
    const cd=S.cds[key]||0;
    el.querySelector('.cd').style.height=cd>0?Math.min(100,(cd/def.cd)*100)+'%':'0%';
    el.classList.toggle('poor',S.sun<def.cost);
    el.classList.toggle('sel',S.selected===key);
  }
  shovelBtn.classList.toggle('sel',S.shovel);
  upBtn.classList.toggle('sel',S.upgrading);
  const wl=document.getElementById('waveLabel');
  if(S.wave===0) wl.textContent='Przygotowanie...';
  else wl.textContent=S.endless?`Fala ${S.wave} ♾️`:`Fala ${S.wave}/${WIN_WAVE}`;
  const prog=S.totalWave>0?Math.min(100,(S.killedWave/S.totalWave)*100):0;
  document.getElementById('waveBar').style.width=prog+'%';
  document.getElementById('killLabel').textContent='☠️ '+S.kills;
}

// ====== PĘTLA ======
let lastT=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-lastT)/1000);
  lastT=now;
  update(dt);
  draw();
  updateUI();
  requestAnimationFrame(loop);
}
showMenu();
requestAnimationFrame(loop);
</script>
