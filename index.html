<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kwiatki vs Zombiaki 🌻🧟</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:radial-gradient(ellipse at 50% -20%, #35502a 0%, #1c2a14 55%, #0e150a 100%);
    color:#eee; font-family:'Segoe UI',system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:10px;
    user-select:none; -webkit-user-select:none;
  }
  h1 {
    font-size:24px; margin:4px 0 10px; letter-spacing:2px; font-weight:900;
    background:linear-gradient(#ffe98a,#ffb62e 60%,#d97b16);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(2px 3px 0 rgba(0,0,0,.7));
  }
  #topbar {
    width:970px; max-width:100%; display:flex; align-items:stretch; gap:8px;
    background:linear-gradient(#4a3520,#33240f); border:3px solid #7a5730; border-radius:12px;
    padding:7px; margin-bottom:8px; box-shadow:0 6px 18px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.12);
  }
  #sunbox {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(#241a0d,#1a1208); border:2px solid #5d451f; border-radius:10px;
    padding:4px 10px; min-width:84px; box-shadow:inset 0 2px 6px rgba(0,0,0,.6);
  }
  #sunIcon { width:32px; height:32px; }
  #sunCount { font-size:20px; font-weight:bold; color:#ffd94a; text-shadow:0 0 8px rgba(255,200,40,.5); }
  #cards { display:flex; gap:6px; flex:1; flex-wrap:wrap; }
  .card {
    position:relative; width:64px; height:78px;
    background:linear-gradient(#68512a,#463314); border:2px solid #94733d; border-radius:10px;
    cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:1px; overflow:hidden; transition:transform .08s, box-shadow .08s;
    box-shadow:0 3px 6px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.15);
  }
  .card:hover { transform:scale(1.06); box-shadow:0 5px 12px rgba(0,0,0,.5); }
  .card canvas { width:44px; height:44px; }
  .card .cost {
    font-size:12px; font-weight:bold; color:#ffd94a;
    background:rgba(0,0,0,.35); border-radius:6px; padding:0 7px; line-height:15px;
  }
  .card.sel { border-color:#8dff6e; box-shadow:0 0 14px rgba(125,255,90,.8), inset 0 0 8px rgba(125,255,90,.3); }
  .card.poor canvas, .card.poor .cost { opacity:.35; filter:grayscale(.7); }
  .card .cd {
    position:absolute; left:0; bottom:0; width:100%; height:0%;
    background:rgba(0,0,0,.72); pointer-events:none;
  }
  #tools { display:flex; flex-direction:column; gap:4px; justify-content:center; }
  .tool {
    background:linear-gradient(#68512a,#463314); border:2px solid #94733d; border-radius:8px;
    color:#f5e8cf; font-size:13px; padding:3px 9px; cursor:pointer; white-space:nowrap;
    text-shadow:1px 1px 0 rgba(0,0,0,.6);
  }
  .tool:hover { filter:brightness(1.15); }
  .tool.sel { border-color:#ff7a5e; box-shadow:0 0 10px rgba(255,110,80,.8); }
  #waveinfo {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-width:132px; background:linear-gradient(#241a0d,#1a1208); border:2px solid #5d451f;
    border-radius:10px; padding:4px 8px; gap:4px; box-shadow:inset 0 2px 6px rgba(0,0,0,.6);
  }
  #waveLabel { font-size:14px; font-weight:bold; color:#ffb14a; }
  #waveBarWrap { width:112px; height:11px; background:#0d0d0d; border-radius:6px; overflow:hidden; border:1px solid #443311; }
  #waveBar { height:100%; width:0%; background:linear-gradient(90deg,#5eff6a,#ffd94a,#ff8a3a); transition:width .3s; }
  #killLabel { font-size:11px; color:#b8a888; }
  #stage { position:relative; width:970px; max-width:100%; }
  canvas#cv {
    width:100%; display:block; border:4px solid #7a5730; border-radius:12px;
    cursor:crosshair; box-shadow:0 10px 30px rgba(0,0,0,.6), inset 0 0 40px rgba(0,0,0,.2);
  }
  #overlay {
    position:absolute; inset:0; background:rgba(8,13,4,.9); border-radius:12px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:20px; z-index:5; backdrop-filter:blur(3px);
  }
  #overlay.hidden { display:none; }
  #overlay h2 {
    font-size:40px; margin-bottom:12px; font-weight:900; letter-spacing:1px;
    background:linear-gradient(#ffe98a,#ffb62e 60%,#d97b16);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(3px 3px 0 rgba(0,0,0,.8));
  }
  #overlay p { margin:4px 0; font-size:15px; color:#ddd; }
  #overlay .feat { color:#9fe870; font-size:14px; }
  #overlay button {
    margin-top:16px; font-size:22px; font-weight:bold; padding:10px 34px; cursor:pointer;
    background:linear-gradient(#8ee252,#4a9e22 60%,#3a7d18); color:#fff; border:3px solid #2d6212;
    border-radius:12px; text-shadow:1px 2px 0 rgba(0,0,0,.6); margin-left:6px; margin-right:6px;
    box-shadow:0 5px 0 #1e4a0c, 0 8px 16px rgba(0,0,0,.5);
  }
  #overlay button:hover { filter:brightness(1.12); transform:translateY(-1px); }
  #overlay button:active { transform:translateY(3px); box-shadow:0 2px 0 #1e4a0c; }
  #overlay button.alt { background:linear-gradient(#e8c25a,#9e7422 60%,#7d5a16); border-color:#62480f; font-size:17px; box-shadow:0 5px 0 #4a370c, 0 8px 16px rgba(0,0,0,.5); }
  #hint { font-size:12px; color:#8a9a78; margin-top:8px; text-align:center; text-shadow:1px 1px 0 rgba(0,0,0,.5); }
</style>
</head>
<body>
<h1>KWIATKI vs ZOMBIAKI</h1>

<div id="topbar">
  <div id="sunbox"><canvas id="sunIcon" width="32" height="32"></canvas><span id="sunCount">150</span></div>
  <div id="cards"></div>
  <div id="tools">
    <button class="tool" id="shovelBtn">🪏 Łopata</button>
    <button class="tool" id="upBtn">⭐ Ulepsz (150)</button>
    <button class="tool" id="muteBtn">🔊 Dźwięk</button>
  </div>
  <div id="waveinfo">
    <span id="waveLabel">Fala –</span>
    <div id="waveBarWrap"><div id="waveBar"></div></div>
    <span id="killLabel">☠️ 0</span>
  </div>
</div>

<div id="stage">
  <canvas id="cv" width="970" height="480"></canvas>
  <div id="overlay"></div>
</div>
<div id="hint">Klikaj słońca i power-upy na planszy · Wybierz kartę i kliknij pole, by sadzić · PPM anuluje · [P] pauza</div>

<script>
'use strict';

// ====== STAŁE PLANSZY ======
const COLS=9, ROWS=5, CW=100, CH=96, GX=70;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height;
const WIN_WAVE=10, UPGRADE_COST=150;
const TAU=Math.PI*2;

// ====== DEFINICJE ROŚLIN ======
const PLANTS={
  sunflower:{name:'Słonecznik', cost:50,  hp:80,  cd:5,  desc:'produkuje słońce'},
  pea:      {name:'Groszek',    cost:100, hp:100, cd:5,  desc:'strzela groszkiem'},
  ice:      {name:'Mrozak',     cost:175, hp:100, cd:6,  desc:'spowalnia zombie'},
  nut:      {name:'Orzech',     cost:50,  hp:600, cd:18, desc:'twarda ściana'},
  cherry:   {name:'Wiśnia',     cost:150, hp:100, cd:25, desc:'eksploduje 3x3'},
  tesla:    {name:'Tesla',      cost:200, hp:100, cd:10, desc:'razi łańcuchem'},
};

// ====== DEFINICJE ZOMBIE ======
const ZTYPES={
  normal:{hp:100,  speed:11},
  cone:  {hp:230,  speed:11},
  bucket:{hp:400,  speed:10},
  runner:{hp:70,   speed:26},
  boss:  {hp:1600, speed:7},
};

// ====== DŹWIĘK ======
let audioCtx=null, muted=false;
function beep(freq,dur,type='square',vol=0.05){
  if(muted) return;
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

// ====== POMOCNICZE RYSOWANIE ======
function rr(g,x,y,w,h,r){
  g.beginPath();
  g.moveTo(x+r,y);
  g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r);
  g.closePath();
}
function star(g,x,y,r,color){
  g.save(); g.translate(x,y); g.fillStyle=color;
  g.beginPath();
  for(let i=0;i<10;i++){
    const a=-Math.PI/2+i*Math.PI/5, rad=i%2===0?r:r*0.45;
    g.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
  }
  g.closePath(); g.fill();
  g.strokeStyle='rgba(120,80,0,.6)'; g.lineWidth=1; g.stroke();
  g.restore();
}
function leaf(g,x,y,dir,color='#4da33a'){
  g.save(); g.translate(x,y); g.scale(dir,1); g.rotate(-0.55);
  g.fillStyle=color;
  g.beginPath(); g.ellipse(8,0,8.5,3.6,0,0,TAU); g.fill();
  g.strokeStyle='rgba(30,80,20,.5)'; g.lineWidth=1;
  g.beginPath(); g.moveTo(1,0); g.lineTo(15,0); g.stroke();
  g.restore();
}
function stem(g,sway){
  g.strokeStyle='#3f9331'; g.lineWidth=5; g.lineCap='round';
  g.beginPath(); g.moveTo(0,32); g.quadraticCurveTo(-2+sway*20,18,sway*30,6); g.stroke();
}
function plantShadow(g){
  g.fillStyle='rgba(0,0,0,.22)';
  g.beginPath(); g.ellipse(0,33,17,4.5,0,0,TAU); g.fill();
}

// ====== GRAFIKA ROŚLIN ======
function drawSunflower(g,t,up){
  const sw=Math.sin(t*1.8)*0.05;
  plantShadow(g);
  stem(g,sw);
  leaf(g,-1,25,-1); leaf(g,1,28,1);
  g.save(); g.translate(sw*30,0); g.rotate(sw*1.5);
  for(let i=0;i<12;i++){
    g.save(); g.rotate(i*Math.PI/6+Math.sin(t*1.8)*0.03);
    const pg=g.createLinearGradient(6,0,24,0);
    pg.addColorStop(0,'#ffb814'); pg.addColorStop(1,up?'#ffe45e':'#ffd428');
    g.fillStyle=pg;
    g.beginPath(); g.ellipse(15.5,0,9.5,4.4,0,0,TAU); g.fill();
    g.strokeStyle='rgba(180,110,0,.45)'; g.lineWidth=1; g.stroke();
    g.restore();
  }
  const cg=g.createRadialGradient(-3,-3,1,0,0,11);
  cg.addColorStop(0,'#a5702f'); cg.addColorStop(1,'#5e3a14');
  g.fillStyle=cg;
  g.beginPath(); g.arc(0,0,10.5,0,TAU); g.fill();
  g.strokeStyle='#4a2d0e'; g.lineWidth=1.5; g.stroke();
  // twarz
  g.fillStyle='#fff';
  g.beginPath(); g.arc(-3.5,-2,2.2,0,TAU); g.arc(3.5,-2,2.2,0,TAU); g.fill();
  g.fillStyle='#2b1a0a';
  g.beginPath(); g.arc(-3,-1.7,1.1,0,TAU); g.arc(4,-1.7,1.1,0,TAU); g.fill();
  g.strokeStyle='#2b1a0a'; g.lineWidth=1.4; g.lineCap='round';
  g.beginPath(); g.arc(0,2,4,0.25*Math.PI,0.75*Math.PI); g.stroke();
  g.restore();
}

function drawShooter(g,t,ice,recoil,up){
  const sw=Math.sin(t*2+1)*0.04;
  plantShadow(g);
  stem(g,sw);
  leaf(g,-2,26,-1); leaf(g,2,28,1);
  g.save(); g.translate(-Math.max(0,recoil)*40+sw*20,-8); g.rotate(sw);
  const cL=ice?'#bfe9f7':'#a2d95e', cM=ice?'#79c4e2':'#63b52c', cD=ice?'#3d85a8':'#3c7f18';
  // czubek — kiełek
  g.save(); g.translate(-4,-15); g.rotate(-0.5+sw*2);
  leaf(g,0,0,-1,ice?'#8fd2e8':'#4da33a');
  g.restore();
  // głowa
  const hg=g.createRadialGradient(-7,-6,2,-2,0,17);
  hg.addColorStop(0,cL); hg.addColorStop(0.6,cM); hg.addColorStop(1,cD);
  g.fillStyle=hg;
  g.beginPath(); g.arc(-2,0,14.5,0,TAU); g.fill();
  // ryjek / lufa
  const sg=g.createLinearGradient(4,-12,4,6);
  sg.addColorStop(0,cM); sg.addColorStop(1,cD);
  g.fillStyle=sg;
  g.beginPath(); g.ellipse(9,-3,11,8.5,0,0,TAU); g.fill();
  // wylot lufy
  g.fillStyle=cD;
  g.beginPath(); g.ellipse(17.5,-3,4.5,6.5,0,0,TAU); g.fill();
  g.fillStyle=ice?'#1e4a61':'#1c3a0b';
  g.beginPath(); g.ellipse(18.5,-3,2.6,4.5,0,0,TAU); g.fill();
  // oko
  g.fillStyle='#fff';
  g.beginPath(); g.ellipse(-1,-5.5,3.6,4.2,0,0,TAU); g.fill();
  g.fillStyle='#1a1a1a';
  g.beginPath(); g.arc(0.4,-5,1.8,0,TAU); g.fill();
  g.strokeStyle=cD; g.lineWidth=1.6; g.lineCap='round';
  g.beginPath(); g.moveTo(-5,-10); g.lineTo(1,-11); g.stroke();
  if(ice){ // sople i szron
    g.fillStyle='rgba(255,255,255,.85)';
    for(const [fx,fy] of [[-10,-8],[-12,2],[-4,8]]){
      g.beginPath(); g.moveTo(fx,fy); g.lineTo(fx+2,fy+5); g.lineTo(fx+4,fy); g.closePath(); g.fill();
    }
  }
  if(up){ star(g,10,-16,6,'#ffd21f'); }
  g.restore();
}

function drawNut(g,t,hpRatio,up){
  const br=1+Math.sin(t*2.4)*0.015;
  plantShadow(g);
  g.save(); g.scale(1,br);
  const ng=g.createRadialGradient(-7,-12,3,0,2,30);
  ng.addColorStop(0,'#e0ac66'); ng.addColorStop(0.65,'#b0793a'); ng.addColorStop(1,'#7d5222');
  g.fillStyle=ng;
  g.beginPath(); g.ellipse(0,5,20,27,0,0,TAU); g.fill();
  g.strokeStyle='#5e3c14'; g.lineWidth=2; g.stroke();
  // połysk
  g.fillStyle='rgba(255,240,200,.3)';
  g.beginPath(); g.ellipse(-8,-9,4.5,9,-0.35,0,TAU); g.fill();
  // twarz
  const worried=hpRatio<0.5;
  g.fillStyle='#fff';
  g.beginPath(); g.arc(-6,-2,3.4,0,TAU); g.arc(6,-2,3.4,0,TAU); g.fill();
  g.fillStyle='#241505';
  g.beginPath(); g.arc(-5.4,-1.6,1.7,0,TAU); g.arc(6.6,-1.6,1.7,0,TAU); g.fill();
  g.strokeStyle='#3d2508'; g.lineWidth=1.8; g.lineCap='round';
  g.beginPath();
  if(worried) g.arc(0,13,4.5,1.2*Math.PI,1.8*Math.PI);
  else g.arc(0,7,4.5,0.2*Math.PI,0.8*Math.PI);
  g.stroke();
  // brwi
  g.beginPath(); g.moveTo(-9,-7); g.lineTo(-3.6,-8.4); g.moveTo(3.6,-8.4); g.lineTo(9,-7); g.stroke();
  // pęknięcia
  g.strokeStyle='#4a2e0c'; g.lineWidth=1.6;
  if(hpRatio<0.66){
    g.beginPath(); g.moveTo(12,-16); g.lineTo(9,-9); g.lineTo(13,-3); g.stroke();
  }
  if(hpRatio<0.33){
    g.beginPath(); g.moveTo(-13,8); g.lineTo(-8,14); g.lineTo(-12,20); g.stroke();
    g.beginPath(); g.moveTo(2,20); g.lineTo(6,25); g.stroke();
  }
  if(up){ star(g,13,-20,6,'#ffd21f'); }
  g.restore();
}

function drawCherryB(g,t,fuse){
  const arming=fuse<0.9;
  const flash=arming&&fuse<0.4&&Math.floor(fuse*16)%2===0;
  const puls=arming?1+Math.sin(t*22)*0.06:1;
  plantShadow(g);
  g.save(); g.scale(puls,puls);
  // ogonki
  g.strokeStyle='#3f7a28'; g.lineWidth=2.6; g.lineCap='round';
  g.beginPath(); g.moveTo(-8,-6); g.quadraticCurveTo(-4,-16,2,-19); g.stroke();
  g.beginPath(); g.moveTo(10,-3); g.quadraticCurveTo(8,-14,2,-19); g.stroke();
  // lont z iskrą
  g.strokeStyle='#7d5a2a'; g.lineWidth=2;
  g.beginPath(); g.moveTo(2,-19); g.quadraticCurveTo(6,-23,4,-27); g.stroke();
  const sp=1+Math.sin(t*30)*0.5;
  g.fillStyle='#ffe95e';
  star(g,4,-28,3.5*sp,'#ffe95e');
  // wisienki
  for(const [cx,cy,r] of [[-9,6,11.5],[10,9,10.5]]){
    const cg2=g.createRadialGradient(cx-4,cy-5,1,cx,cy,r+2);
    if(flash){ cg2.addColorStop(0,'#fff'); cg2.addColorStop(1,'#ff9c8a'); }
    else { cg2.addColorStop(0,'#ff6a52'); cg2.addColorStop(0.6,'#d92714'); cg2.addColorStop(1,'#8f0f06'); }
    g.fillStyle=cg2;
    g.beginPath(); g.arc(cx,cy,r,0,TAU); g.fill();
    g.fillStyle='rgba(255,255,255,.45)';
    g.beginPath(); g.ellipse(cx-3.5,cy-4.5,2.8,1.8,-0.5,0,TAU); g.fill();
    // gniewne oczy
    g.fillStyle='#fff';
    g.beginPath(); g.arc(cx-2,cy-1,2.4,0,TAU); g.arc(cx+3,cy-1,2.4,0,TAU); g.fill();
    g.fillStyle='#1a0505';
    g.beginPath(); g.arc(cx-1.5,cy-0.6,1.2,0,TAU); g.arc(cx+3.5,cy-0.6,1.2,0,TAU); g.fill();
    g.strokeStyle='#5e0a02'; g.lineWidth=1.6;
    g.beginPath(); g.moveTo(cx-5,cy-5); g.lineTo(cx-0.5,cy-3.2); g.moveTo(cx+6.5,cy-5); g.lineTo(cx+2,cy-3.2); g.stroke();
  }
  g.restore();
}

function drawTesla(g,t,up,flash){
  plantShadow(g);
  // doniczka metalowa
  const bg2=g.createLinearGradient(-12,18,12,18);
  bg2.addColorStop(0,'#5d6870'); bg2.addColorStop(0.5,'#9aa7b0'); bg2.addColorStop(1,'#5d6870');
  g.fillStyle=bg2;
  g.beginPath(); g.moveTo(-12,17); g.lineTo(12,17); g.lineTo(9,32); g.lineTo(-9,32); g.closePath(); g.fill();
  g.strokeStyle='#3d454c'; g.lineWidth=1.5; g.stroke();
  g.fillStyle='#48525a';
  g.beginPath(); g.ellipse(0,17,12,3,0,0,TAU); g.fill();
  // pręt cewki
  const rg=g.createLinearGradient(-4,0,4,0);
  rg.addColorStop(0,'#707c85'); rg.addColorStop(0.5,'#c2ccd4'); rg.addColorStop(1,'#707c85');
  g.fillStyle=rg;
  g.fillRect(-3.5,-8,7,25);
  g.strokeStyle='#4a545c'; g.lineWidth=1.4;
  for(let i=0;i<3;i++){ g.beginPath(); g.moveTo(-3.5,-2+i*6); g.lineTo(3.5,-2+i*6); g.stroke(); }
  // kula plazmowa
  const pulse=0.85+Math.sin(t*6)*0.15+(flash>0?flash*2.5:0);
  const orbR=up?10:8;
  const gl=g.createRadialGradient(0,-14,1,0,-14,orbR*2.4*pulse);
  gl.addColorStop(0,'rgba(200,245,255,.85)');
  gl.addColorStop(0.4,'rgba(90,200,255,.4)');
  gl.addColorStop(1,'rgba(90,200,255,0)');
  g.fillStyle=gl;
  g.beginPath(); g.arc(0,-14,orbR*2.4*pulse,0,TAU); g.fill();
  const og=g.createRadialGradient(-2,-16,1,0,-14,orbR);
  og.addColorStop(0,'#ffffff'); og.addColorStop(0.55,'#9fe4ff'); og.addColorStop(1,'#2f9ad4');
  g.fillStyle=og;
  g.beginPath(); g.arc(0,-14,orbR,0,TAU); g.fill();
  // iskry wokół kuli
  g.strokeStyle='rgba(220,250,255,.8)'; g.lineWidth=1.4; g.lineCap='round';
  for(let i=0;i<3;i++){
    const a=t*4+i*2.1;
    const x1=Math.cos(a)*orbR, y1=-14+Math.sin(a)*orbR;
    g.beginPath(); g.moveTo(x1,y1);
    g.lineTo(x1+Math.cos(a)*5+(Math.random()-0.5)*4, y1+Math.sin(a)*5+(Math.random()-0.5)*4);
    g.stroke();
  }
  if(up){ star(g,12,-24,6,'#ffd21f'); }
}

function drawPlantArt(g,type,t,p){
  const up=!!(p&&p.up);
  switch(type){
    case 'sunflower': drawSunflower(g,t,up); break;
    case 'pea':  drawShooter(g,t,false,p?(p.recoil||0):0,up); break;
    case 'ice':  drawShooter(g,t,true, p?(p.recoil||0):0,up); break;
    case 'nut':  drawNut(g,t,p?Math.max(0,p.hp/p.maxHp):1,up); break;
    case 'cherry': drawCherryB(g,t,p?p.fuse:1); break;
    case 'tesla':  drawTesla(g,t,up,p?(p.recoil||0):0); break;
  }
}

// ====== GRAFIKA ZOMBIE ======
function drawZombieArt(g,t,z){
  const boss=z.type==='boss';
  const s=boss?1.62 : z.type==='runner'?0.95 : 1.05;
  const skin  = boss?'#c0563e':'#a8bd72';
  const skinD = boss?'#8a3a26':'#7d9350';
  const skinL = boss?'#d97a5a':'#c4d494';
  const suit  = boss?'#4a2b3a':'#6e6757';
  const suitD = boss?'#33202b':'#514c3d';
  const pants = boss?'#3a2430':'#4a4438';
  const moving = z.frozenT<=0 && !z.eating;
  const wob=z.wob;
  g.save();
  g.translate(0,34*(1-s)); g.scale(s,s);
  // cień
  g.fillStyle='rgba(0,0,0,.28)';
  g.beginPath(); g.ellipse(0,33,15,4.5,0,0,TAU); g.fill();
  // smugi biegacza
  if(z.type==='runner'&&moving){
    g.strokeStyle='rgba(255,255,255,.3)'; g.lineWidth=2; g.lineCap='round';
    for(let i=0;i<3;i++){
      const yy=-6+i*10, off=(t*90+i*13)%22;
      g.beginPath(); g.moveTo(14+off,yy); g.lineTo(24+off,yy); g.stroke();
    }
  }
  // nogi
  const swl=moving?Math.sin(wob*2.2)*4.5:1.5;
  g.strokeStyle=pants; g.lineWidth=5.5; g.lineCap='round';
  g.beginPath(); g.moveTo(-3,13); g.lineTo(-4+swl,30); g.stroke();
  g.beginPath(); g.moveTo(3,13); g.lineTo(4-swl,30); g.stroke();
  g.fillStyle='#2c2822';
  g.beginPath(); g.ellipse(-6+swl,31.5,5,2.6,0,0,TAU); g.fill();
  g.beginPath(); g.ellipse(2-swl,31.5,5,2.6,0,0,TAU); g.fill();
  const lean=z.type==='runner'?-0.22:-0.06;
  g.save(); g.rotate(lean);
  // tułów — podarta marynarka
  const tg2=g.createLinearGradient(-9,-10,9,14);
  tg2.addColorStop(0,suit); tg2.addColorStop(1,suitD);
  g.fillStyle=tg2;
  rr(g,-9,-10,18,24,4); g.fill();
  g.fillStyle=suitD;
  g.beginPath(); g.moveTo(-9,14); g.lineTo(-5,9); g.lineTo(-1,14); g.closePath(); g.fill();
  g.beginPath(); g.moveTo(3,14); g.lineTo(6,10); g.lineTo(9,14); g.closePath(); g.fill();
  // krawat
  g.fillStyle=boss?'#d4a017':'#8f2f26';
  g.beginPath(); g.moveTo(0,-8); g.lineTo(-2.5,-4); g.lineTo(0,6); g.lineTo(2.5,-4); g.closePath(); g.fill();
  // ramiona wyciągnięte do przodu
  const armY=-4+Math.sin(wob*2.2+1)*1.5+(z.eating?Math.sin(wob*5)*2.5:0);
  g.strokeStyle=suitD; g.lineWidth=5;
  g.beginPath(); g.moveTo(-4,-6); g.lineTo(-15,armY); g.stroke();
  g.strokeStyle=skinD; g.lineWidth=4.4;
  g.beginPath(); g.moveTo(-15,armY); g.lineTo(-22,armY+3); g.stroke();
  g.fillStyle=skinD; g.beginPath(); g.arc(-23,armY+3,3,0,TAU); g.fill();
  g.strokeStyle=suit; g.lineWidth=5;
  g.beginPath(); g.moveTo(-2,-2); g.lineTo(-14,armY+5); g.stroke();
  g.strokeStyle=skin; g.lineWidth=4.4;
  g.beginPath(); g.moveTo(-14,armY+5); g.lineTo(-21,armY+8); g.stroke();
  g.fillStyle=skin; g.beginPath(); g.arc(-22,armY+8,3,0,TAU); g.fill();
  // głowa
  g.save(); g.translate(-2,-16); g.rotate(Math.sin(wob*1.6)*0.05-0.04);
  const chomp=z.eating?2+Math.abs(Math.sin(wob*4.5))*3.5:1.4;
  const hg2=g.createRadialGradient(-3,-7,1,0,-3,12);
  hg2.addColorStop(0,skinL); hg2.addColorStop(1,skin);
  g.fillStyle=hg2;
  g.beginPath(); g.arc(0,-4,9.8,0,TAU); g.fill();
  // ucho
  g.fillStyle=skinD;
  g.beginPath(); g.arc(8,-4,2.4,0,TAU); g.fill();
  // szczęka
  g.fillStyle=skinD;
  g.beginPath(); g.ellipse(-3,3.5+chomp*0.5,6.2,3.6,0,0,TAU); g.fill();
  // usta
  g.fillStyle='#3a1d1d';
  g.beginPath(); g.ellipse(-4,1.5,4.6,chomp,0,0,TAU); g.fill();
  g.fillStyle='#e8e3d0';
  g.fillRect(-6.5,0.2,2,1.6); g.fillRect(-3,0.2,2,1.6);
  // oczy
  g.fillStyle='#e8e3d0';
  g.beginPath(); g.arc(-5,-6,2.8,0,TAU); g.arc(2.4,-7,3.2,0,TAU); g.fill();
  g.fillStyle=boss?'#ff3a1a':'#1e1e1e';
  g.beginPath(); g.arc(-6,-6,1.2,0,TAU); g.arc(1.2,-7,1.35,0,TAU); g.fill();
  // opadająca powieka + blizna
  g.strokeStyle=skinD; g.lineWidth=1.6; g.lineCap='round';
  g.beginPath(); g.moveTo(0,-10); g.lineTo(5,-9.4); g.stroke();
  g.beginPath(); g.moveTo(4,-13); g.lineTo(7,-10);
  g.moveTo(4.4,-12.6) ; g.lineTo(5.8,-13.4);
  g.moveTo(5.4,-11.6); g.lineTo(6.8,-12.4); g.stroke();
  // włosy
  g.strokeStyle='#3a3a2c'; g.lineWidth=1.6;
  g.beginPath();
  g.moveTo(-6,-12.5); g.lineTo(-7.5,-16);
  g.moveTo(-2,-13.6); g.lineTo(-2.4,-17.4);
  g.moveTo(2,-13.4); g.lineTo(3.4,-16.6);
  g.stroke();
  // akcesoria
  if(z.type==='cone'){
    const cg3=g.createLinearGradient(-8,-28,6,-10);
    cg3.addColorStop(0,'#f0a03c'); cg3.addColorStop(1,'#c26a1a');
    g.fillStyle=cg3;
    g.beginPath(); g.moveTo(-8,-11); g.lineTo(-1,-30); g.lineTo(6,-11); g.closePath(); g.fill();
    g.strokeStyle='#8f4a10'; g.lineWidth=1.4; g.stroke();
    g.strokeStyle='#ffe0b0'; g.lineWidth=2;
    g.beginPath(); g.moveTo(-4.6,-18); g.lineTo(2.8,-18); g.stroke();
    g.fillStyle='#c26a1a';
    g.beginPath(); g.ellipse(-1,-11,8.4,2.4,0,0,TAU); g.fill();
  } else if(z.type==='bucket'){
    const bg3=g.createLinearGradient(-9,-28,7,-10);
    bg3.addColorStop(0,'#b8c2ca'); bg3.addColorStop(1,'#78848d');
    g.fillStyle=bg3;
    g.beginPath(); g.moveTo(-9,-10); g.lineTo(-7,-28); g.lineTo(5,-28); g.lineTo(7,-10); g.closePath(); g.fill();
    g.strokeStyle='#4d565e'; g.lineWidth=1.6; g.stroke();
    g.fillStyle='#68747d';
    g.beginPath(); g.ellipse(-1,-10,8.6,2.4,0,0,TAU); g.fill();
    g.strokeStyle='rgba(255,255,255,.55)'; g.lineWidth=2;
    g.beginPath(); g.moveTo(-5.5,-25) ; g.lineTo(-4.5,-13); g.stroke();
  } else if(z.type==='runner'){
    g.fillStyle='#d92f1e';
    rr(g,-9,-11.5,18.4,4.4,2); g.fill();
    g.beginPath(); g.moveTo(8,-10); g.lineTo(16,-7); g.lineTo(15,-11); g.closePath(); g.fill();
  } else if(boss){
    g.fillStyle='#4a2018';
    g.beginPath(); g.moveTo(-8,-9); g.quadraticCurveTo(-15,-16,-12,-24); g.quadraticCurveTo(-9,-17,-5,-13); g.closePath(); g.fill();
    g.beginPath(); g.moveTo(6,-10); g.quadraticCurveTo(13,-17,10,-25); g.quadraticCurveTo(7,-18,3,-14); g.closePath(); g.fill();
    g.fillStyle='#ffd21f';
    g.beginPath();
    g.moveTo(-6,-13); g.lineTo(-6,-20); g.lineTo(-3.4,-15.5); g.lineTo(-1,-21); g.lineTo(1.4,-15.5); g.lineTo(4,-20); g.lineTo(4,-13);
    g.closePath(); g.fill();
    g.strokeStyle='#a5780a'; g.lineWidth=1; g.stroke();
  }
  g.restore(); // głowa
  g.restore(); // pochylenie
  // zamrożenie / spowolnienie / trafienie
  if(z.frozenT>0){
    g.fillStyle='rgba(140,210,255,.4)'; g.strokeStyle='rgba(225,248,255,.85)'; g.lineWidth=2;
    rr(g,-15,-32,30,66,7); g.fill(); g.stroke();
    g.strokeStyle='rgba(255,255,255,.6)'; g.lineWidth=2.5;
    g.beginPath(); g.moveTo(-8,-26); g.lineTo(2,-12); g.stroke();
  } else if(z.slowT>0){
    g.fillStyle='rgba(110,195,255,.2)';
    g.beginPath(); g.ellipse(0,0,17,34,0,0,TAU); g.fill();
  }
  if(z.hitT>0){
    g.fillStyle=`rgba(255,255,255,${Math.min(0.8,z.hitT*6)})`;
    g.beginPath(); g.ellipse(-1,-1,15,30,0,0,TAU); g.fill();
  }
  g.restore();
}

function drawMowerArt(g,t,active){

  g.strokeStyle='#5a5a5a'; g.lineWidth=3; g.lineCap='round';
  g.beginPath(); g.moveTo(10,-4); g.lineTo(20,-18); g.stroke();
  g.strokeStyle='#333'; g.lineWidth=2;
  g.beginPath(); g.moveTo(18,-19); g.lineTo(23,-16); g.stroke();
  // korpus
  const mg=g.createLinearGradient(0,-14,0,0);
  mg.addColorStop(0,'#e85a42'); mg.addColorStop(1,'#9e2f1e');
  g.fillStyle=mg;
  rr(g,-16,-13,32,12,4); g.fill();
  g.strokeStyle='#701d10'; g.lineWidth=1.5; g.stroke();
  // silnik
  g.fillStyle='#8a8f94';
  rr(g,-8,-19,12,7,2); g.fill();
  g.strokeStyle='#54585c'; g.stroke();

  g.fillStyle='#7d1f12';
  g.beginPath(); g.moveTo(16,-10); g.lineTo(22,-2); g.lineTo(16,-1); g.closePath(); g.fill();

    g.fillStyle='#6e6e6e'; g.beginPath(); g.arc(0,0,2.6,0,TAU); g.fill();

    g.beginPath(); g.moveTo(-5,0); g.lineTo(5,0); g.moveTo(0,-5); g.lineTo(0,5); g.stroke();

}

function drawSunArt(g,t,r,alpha){
  g.save(); g.globalAlpha=alpha;
  const gl=g.createRadialGradient(0,0,r*0.4,0,0,r*2);
  gl.addColorStop(0,'rgba(255,225,110,.55)'); gl.addColorStop(1,'rgba(255,225,110,0)');
  g.fillStyle=gl;
  g.beginPath(); g.arc(0,0,r*2,0,TAU); g.fill();
  g.save(); g.rotate(t*0.7);
  g.fillStyle='rgba(255,205,40,.9)';
  for(let i=0;i<12;i++){
    g.rotate(TAU/12);
    g.beginPath();
    g.moveTo(r*0.75,-r*0.22); g.lineTo(r*1.45,0); g.lineTo(r*0.75,r*0.22);
    g.closePath(); g.fill();
  }
  g.restore();
  const cg4=g.createRadialGradient(-r*0.25,-r*0.25,1,0,0,r);
  cg4.addColorStop(0,'#fffbe0'); cg4.addColorStop(0.55,'#ffd934'); cg4.addColorStop(1,'#f09d0c');
  g.fillStyle=cg4;
  g.beginPath(); g.arc(0,0,r,0,TAU); g.fill();
  g.restore();
}

  if(type==='sun'){

    g.quadraticCurveTo(14,-4,0,-13); g.closePath(); g.fill();
    g.strokeStyle='#8a5c12'; g.lineWidth=1.6; g.stroke();

    g.fillStyle=ig;
    rr(g,-12,-12,24,24,5); g.fill();
    g.strokeStyle='#fff'; g.lineWidth=1.6; g.stroke();
    g.strokeStyle='#2e7ba6'; g.lineWidth=2; g.lineCap='round';
    g.beginPath();
    g.moveTo(0,-8); g.lineTo(0,8);
    g.moveTo(-7,-4); g.lineTo(7,4);
    g.moveTo(-7,4); g.lineTo(7,-4);
    g.stroke();
    g.strokeStyle='rgba(255,255,255,.7)'; g.lineWidth=2;
    g.beginPath(); g.moveTo(-8,-9); g.lineTo(-3,-4); g.stroke();
  } else { // bomb
    const bg4=g.createRadialGradient(-4,-5,1,0,0,14);
    bg4.addColorStop(0,'#5a5a66'); bg4.addColorStop(1,'#16161c');
    g.fillStyle=bg4;
    g.beginPath(); g.arc(0,2,12,0,TAU); g.fill();
    g.fillStyle='#3d3d46';
    rr(g,-4,-13,8,5,2); g.fill();
    g.strokeStyle='#8a6a3a'; g.lineWidth=2;
    g.beginPath(); g.moveTo(0,-13); g.quadraticCurveTo(5,-18,3,-21); g.stroke();
    star(g,3,-22,3.5+Math.sin(t*25)*1.2,'#ffb02e');

    g.beginPath(); g.ellipse(-4,-2,3.4,2.2,-0.5,0,TAU); g.fill();
  }
  g.restore();
}

const bgCanvas=document.createElement('canvas');
bgCanvas.width=W; bgCanvas.height=H;
(function renderBG(){
  const b=bgCanvas.getContext('2d');
  // drewniany ganek
  for(let r=0;r<ROWS;r++){
    const pg=b.createLinearGradient(0,r*CH,0,(r+1)*CH);
    pg.addColorStop(0,'#7a5a38'); pg.addColorStop(1,'#5d4226');
    b.fillStyle=pg; b.fillRect(0,r*CH,GX,CH);
    b.strokeStyle='rgba(40,25,10,.6)'; b.lineWidth=2;
    b.beginPath(); b.moveTo(0,(r+1)*CH-1); b.lineTo(GX,(r+1)*CH-1); b.stroke();
    b.strokeStyle='rgba(40,25,10,.25)'; b.lineWidth=1;
    for(let i=0;i<4;i++){
      const gy=r*CH+14+i*22+((r*7)%9);
      b.beginPath(); b.moveTo(4,gy); b.lineTo(GX-6,gy+3); b.stroke();
    }
  }
  b.strokeStyle='rgba(0,0,0,.35)'; b.lineWidth=3;
  b.beginPath(); b.moveTo(GX-1,0); b.lineTo(GX-1,H); b.stroke();
  // trawa w kratkę z tuftami
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const light=(r+c)%2===0;
    const gg=b.createLinearGradient(0,r*CH,0,(r+1)*CH);
    if(light){ gg.addColorStop(0,'#8fca66'); gg.addColorStop(1,'#79b254'); }
    else { gg.addColorStop(0,'#7cb956'); gg.addColorStop(1,'#69a247'); }
    b.fillStyle=gg;
    b.fillRect(GX+c*CW,r*CH,CW,CH);
    // źdźbła
    b.strokeStyle=light?'rgba(60,110,40,.35)':'rgba(50,95,32,.35)';
    b.lineWidth=1.4; b.lineCap='round';
    for(let i=0;i<7;i++){
      const tx=GX+c*CW+8+Math.random()*(CW-16);
      const ty=r*CH+10+Math.random()*(CH-16);
      b.beginPath(); b.moveTo(tx,ty+4); b.quadraticCurveTo(tx+1,ty,tx+3,ty-3); b.stroke();
    }
    b.strokeStyle='rgba(0,0,0,.06)'; b.lineWidth=1;
    b.strokeRect(GX+c*CW+0.5,r*CH+0.5,CW-1,CH-1);
  }
  // winieta
  const vg=b.createRadialGradient(W/2,H/2,H*0.5,W/2,H/2,W*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.22)');
  b.fillStyle=vg; b.fillRect(0,0,W,H);
})();

}

// ====== FALE ======
function buildQueue(n){
  const count=4+Math.round(n*2.2);
  const pool=[];
  pool.push({t:'normal',w:10});
  if(n>=2) pool.push({t:'cone',w:4+n});
  if(n>=3) pool.push({t:'runner',w:3+n*0.5});
  if(n>=4) pool.push({t:'bucket',w:2+n*0.7});
  const total=pool.reduce((a,p)=>a+p.w,0);
  const q=[];
  for(let i=0;i<count;i++){
    let r=rnd()*total;
    for(const p of pool){ r-=p.w; if(r<=0){ q.push(p.t); break; } }
  }
  if(n%5===0) q.push('boss');
  return q;
}
function startWave(){
  S.wave++;
  S.queue=buildQueue(S.wave);
  S.totalWave=S.queue.length; S.killedWave=0;
  S.spawnT=1.5; S.state='wave';
  if(!S.endless && S.wave===WIN_WAVE) banner('☠️ OSTATNIA FALA! ☠️');
  else if(S.wave%5===0) banner(`Fala ${S.wave} — BOSS! 👹`);
  else banner(`Fala ${S.wave} nadchodzi!`);
  beep(220,.3,'sawtooth',.08);
}
function spawnZombie(type){
  const zt=ZTYPES[type];
  const hpScale = type==='boss' ? (1 + (S.wave-5)*0.18) : (1 + Math.max(0,S.wave-6)*0.07);
  const row=Math.floor(rnd()*ROWS);
  S.zombies.push({
    type, row, x:W+20+rnd()*40, hp:zt.hp*hpScale, maxHp:zt.hp*hpScale,
    speed:zt.speed*(0.9+rnd()*0.2), slowT:0, slowAmt:0, frozenT:0,
    dead:false, wob:rnd()*6.28, eating:false, hitT:0,
  });
}

// ====== ZOMBIE: OBRAŻENIA / ŚMIERĆ ======
function damageZombie(z,dmg){
  if(z.dead) return;
  z.hp-=dmg; z.hitT=0.12;
  if(z.hp<=0) killZombie(z);
}
function killZombie(z){
  z.dead=true; S.kills++; S.killedWave++;
  const cx=z.x, cy=cellY(z.row);
  boom(cx,cy,12,'#8fce6e');
  beep(180,.12,'square',.06);
  // COMBO (autorski dodatek)
  S.combo++; S.comboT=2.5;
  if(S.combo>S.maxCombo) S.maxCombo=S.combo;
  if(S.combo>=2){
    const bonus=Math.min(S.combo*3,30);
    S.sun+=bonus;
    floater(cx,cy-30,`COMBO x${S.combo} +☀️${bonus}`,'#7cff5e',16);
  }
  // POWER-UPY (autorski dodatek)
  if(z.type==='boss'){
    for(let i=0;i<3;i++) dropPickup(cx+(i-1)*45,cy,z.row);
    banner('👹 BOSS POKONANY!');
    shockRing(cx,cy,120,'rgba(255,120,80,');
  } else if(rnd()<0.10){
    dropPickup(cx,cy,z.row);
  }
}
function dropPickup(x,y,row){
  const types=['sun','freeze','bomb'];
  const type=types[Math.floor(rnd()*types.length)];
  S.pickups.push({x:Math.min(Math.max(x,GX+20),W-20),y,row,type,t:9});
}
function usePickup(pk){
  if(pk.type==='sun'){ S.sun+=75; floater(pk.x,pk.y,'+☀️75'); beep(1100,.12,'sine',.08); }
  else if(pk.type==='freeze'){
    for(const z of S.zombies) if(!z.dead) z.frozenT=4;
    banner('🧊 WIELKIE ZAMROŻENIE!'); beep(500,.35,'sine',.08);
    shockRing(pk.x,pk.y,160,'rgba(140,220,255,');
  }
  else if(pk.type==='bomb'){
    for(const z of S.zombies) if(!z.dead && z.row===pk.row) damageZombie(z,400);
    boom(pk.x,pk.y,26,'#ff8844'); banner('💣 BUM! Cała linia!'); beep(90,.4,'square',.12);
    shockRing(pk.x,pk.y,140,'rgba(255,150,60,');
  }
}

// ====== ROŚLINY ======
function placePlant(key,r,c){
  const def=PLANTS[key];
  const p={type:key,row:r,col:c,hp:def.hp,maxHp:def.hp,up:false,
           sunT:5+rnd()*3, shootT:0.5, zapT:1.5, fuse:0.9, recoil:0};
  S.grid[r][c]=p;
  S.sun-=def.cost; S.cds[key]=def.cd;
  S.selected=null;
  boom(cellX(c),cellY(r),8,'#c9f29b');
  beep(520,.08,'triangle',.06);
}
function upgradePlant(p){
  if(p.up || p.type==='cherry'){ floater(cellX(p.col),cellY(p.row),'Nie można!','#ff7a5e',14); return; }
  if(S.sun<UPGRADE_COST){ floater(cellX(p.col),cellY(p.row),'Za mało słońca!','#ff7a5e',14); return; }
  S.sun-=UPGRADE_COST; p.up=true;
  if(p.type==='nut'){ p.maxHp=1200; p.hp=1200; }
  floater(cellX(p.col),cellY(p.row)-20,'⭐ ULEPSZONO!','#ffd94a',16);
  boom(cellX(p.col),cellY(p.row),14,'#ffd94a');
  shockRing(cellX(p.col),cellY(p.row),60,'rgba(255,220,80,');
  beep(880,.15,'triangle',.08);
  S.upgrading=false;
}
function zombieAhead(row,px){
  return S.zombies.some(z=>!z.dead&&z.row===row&&z.x>px-10&&z.x<W+10);
}
function fireProjectile(p){
  const isIce=p.type==='ice';
  const dmg=isIce?(p.up?30:15):(p.up?40:20);
  S.projectiles.push({row:p.row,x:cellX(p.col)+18,dmg,ice:isIce,up:p.up});
  p.recoil=0.15;
  beep(isIce?980:840,.04,'triangle',.02);
}
function teslaZap(p){
  const px=cellX(p.col);
  const range=380, maxT=p.up?5:3, dmg=p.up?70:45;
  const targets=S.zombies.filter(z=>!z.dead&&z.row===p.row&&z.x>px-20&&z.x<px+range)
                         .sort((a,b)=>a.x-b.x).slice(0,maxT);
  if(!targets.length) return false;
  const pts=targets.map(z=>({x:z.x,y:cellY(z.row)-10}));
  S.zaps.push({x0:px,y0:cellY(p.row)-14,pts,t:0.15});
  for(const z of targets) damageZombie(z,dmg);
  p.recoil=0.15;
  beep(600,.1,'sawtooth',.05);
  return true;
}
function explodeCherry(p){
  const cx=cellX(p.col), cy=cellY(p.row);
  for(const z of S.zombies){
    if(z.dead) continue;
    if(Math.abs(z.row-p.row)<=1 && Math.abs(z.x-cx)<=CW*1.5) damageZombie(z,900);
  }
  boom(cx,cy,40,'#ff5c33');
  boom(cx,cy,20,'#ffd21f');
  shockRing(cx,cy,150,'rgba(255,140,50,');
  S.grid[p.row][p.col]=null;
  beep(70,.5,'square',.14);
}

// ====== WYDARZENIA LOSOWE (autorski dodatek) ======
function randomEvent(){
  const r=rnd();
  if(r<0.34){
    banner('☀️ DESZCZ SŁOŃCA!');
    S.sunRain=6; S.sunRainT=0;
  } else if(r<0.67){
    banner('🧟 SZAŁ HORDY!');
    for(let i=0;i<3;i++) spawnZombie(rnd()<0.5?'normal':'runner');
    S.totalWave+=3;
  } else {
    banner('⚡ PRZEŁADOWANIE ROŚLIN!');
    S.overT=8;
  }
}

// ====== WEJŚCIE ======
function canvasPos(e){
  const rect=cv.getBoundingClientRect();
  return { x:(e.clientX-rect.left)*(W/rect.width), y:(e.clientY-rect.top)*(H/rect.height) };
}
cv.addEventListener('mousemove',e=>{ if(!S) return; const p=canvasPos(e); S.mouse=p; });
cv.addEventListener('contextmenu',e=>{
  e.preventDefault();
  if(S){ S.selected=null; S.shovel=false; S.upgrading=false; }
});
cv.addEventListener('click',e=>{
  if(!S || S.state==='menu'||S.state==='over'||S.state==='win'||S.state==='pause') return;
  const {x,y}=canvasPos(e);
  // 1) słońca
  for(let i=S.suns.length-1;i>=0;i--){
    const s=S.suns[i];
    if(Math.hypot(s.x-x,s.y-y)<34){
      S.sun+=s.value; floater(s.x,s.y,'+'+s.value);
      S.suns.splice(i,1); beep(1200,.08,'sine',.06);
      return;
    }
  }
  // 2) power-upy
  for(let i=S.pickups.length-1;i>=0;i--){
    const pk=S.pickups[i];
    if(Math.hypot(pk.x-x,pk.y-y)<32){ usePickup(pk); S.pickups.splice(i,1); return; }
  }
  // 3) siatka
  const c=Math.floor((x-GX)/CW), r=Math.floor(y/CH);
  if(c<0||c>=COLS||r<0||r>=ROWS) return;
  const existing=S.grid[r][c];
  if(S.shovel){
    if(existing){ S.grid[r][c]=null; boom(cellX(c),cellY(r),8,'#a8875a'); beep(300,.08); }
    S.shovel=false; return;
  }
  if(S.upgrading){
    if(existing) upgradePlant(existing);
    return;
  }
  if(S.selected){
    const def=PLANTS[S.selected];
    if(existing){ floater(cellX(c),cellY(r),'Zajęte!','#ff7a5e',14); return; }
    if(S.sun<def.cost||(S.cds[S.selected]||0)>0){ S.selected=null; return; }
    placePlant(S.selected,r,c);
  }
});
document.addEventListener('keydown',e=>{
  if(!S) return;
  if(e.key==='p'||e.key==='P'){
    if(S.state==='wave'||S.state==='prewave'){ S.prevState=S.state; S.state='pause'; showOverlay('<h2>⏸️ PAUZA</h2><p>Naciśnij P, aby kontynuować</p>'); }
    else if(S.state==='pause'){ S.state=S.prevState; hideOverlay(); }
  }
  if(e.key==='Escape'){ S.selected=null; S.shovel=false; S.upgrading=false; }
});

// ====== AKTUALIZACJA ======
function update(dt){
  if(!S || S.state==='menu'||S.state==='pause'||S.state==='over'||S.state==='win') return;

  if(S.state==='prewave'){
    S.preT-=dt;
    if(S.preT<=0) startWave();
  }

  // cooldowny kart
  for(const k in S.cds) if(S.cds[k]>0) S.cds[k]-=dt;

  // słońce z nieba
  S.skyT-=dt;
  if(S.skyT<=0){ dropSkySun(); S.skyT=7+rnd()*4; }
  // deszcz słońca
  if(S.sunRain>0){
    S.sunRainT-=dt;
    if(S.sunRainT<=0){ dropSkySun(); S.sunRain--; S.sunRainT=0.5; }
  }
  // spadanie / życie słońc
  for(let i=S.suns.length-1;i>=0;i--){
    const s=S.suns[i];
    if(s.y<s.targetY) s.y=Math.min(s.y+90*dt,s.targetY);
    s.t-=dt;
    if(s.t<=0) S.suns.splice(i,1);
  }

  // przeładowanie
  if(S.overT>0) S.overT-=dt;
  const rateMul=S.overT>0?2:1;

  // rośliny
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p=S.grid[r][c]; if(!p) continue;
    if(p.recoil>0) p.recoil-=dt;
    if(p.type==='sunflower'){
      p.sunT-=dt;
      if(p.sunT<=0){ plantSun(cellX(c),cellY(r),p.up?50:25); p.sunT=11+rnd()*3; }
    } else if(p.type==='pea'||p.type==='ice'){
      p.shootT-=dt*rateMul;
      if(p.shootT<=0 && zombieAhead(r,cellX(c))){ fireProjectile(p); p.shootT=1.4; }
    } else if(p.type==='tesla'){
      p.zapT-=dt*rateMul;
      if(p.zapT<=0){ if(teslaZap(p)) p.zapT=2.6; else p.zapT=0.3; }
    } else if(p.type==='cherry'){
      p.fuse-=dt;
      if(p.fuse<=0) explodeCherry(p);
    }
  }

  // pociski
  for(let i=S.projectiles.length-1;i>=0;i--){
    const pr=S.projectiles[i];
    pr.x+=320*dt;
    if(pr.x>W+20){ S.projectiles.splice(i,1); continue; }
    let hit=null;
    for(const z of S.zombies){
      if(z.dead||z.row!==pr.row) continue;
      if(Math.abs(z.x-pr.x)<28 && (!hit||z.x<hit.x)) hit=z;
    }
    if(hit){
      damageZombie(hit,pr.dmg);
      if(pr.ice){ hit.slowT=pr.up?4:3; hit.slowAmt=pr.up?0.6:0.4; }
      boom(pr.x,cellY(pr.row)-10,4,pr.ice?'#9fe0ff':'#a8e05a');
      S.projectiles.splice(i,1);
    }
  }

  // zombie
  for(const z of S.zombies){
    if(z.dead) continue;
    z.wob+=dt*6;
    if(z.hitT>0) z.hitT-=dt;
    if(z.frozenT>0){ z.frozenT-=dt; continue; }
    if(z.slowT>0) z.slowT-=dt;
    const sp=z.speed*(z.slowT>0?(1-z.slowAmt):1);
    const frontCol=Math.floor((z.x-24-GX)/CW);
    let eating=false;
    if(frontCol>=0&&frontCol<COLS){
      const p=S.grid[z.row][frontCol];
      if(p){
        eating=true;
        p.hp-=(z.type==='boss'?90:35)*dt;
        if(p.hp<=0){ S.grid[z.row][frontCol]=null; boom(cellX(frontCol),cellY(z.row),10,'#7a9a4e'); beep(240,.1); }
      }
    }
    z.eating=eating;
    if(!eating) z.x-=sp*dt;
    // kosiarka
    if(z.x<GX+6){
      const m=S.mowers[z.row];
      if(!m.used){ m.used=true; m.active=true; beep(400,.3,'sawtooth',.1); }
      else if(z.x<GX-40){ gameOver(); return; }
    }
  }

  // kosiarki
  for(const m of S.mowers){
    if(!m.active||m.gone) continue;
    m.x+=330*dt;
    for(const z of S.zombies){
      if(z.dead||z.row!==m.row) continue;
      if(z.x<m.x+42){
        if(z.type==='boss') damageZombie(z,1500);
        else killZombie(z);
      }
    }
    if(m.x>W+60){ m.active=false; m.gone=true; }
  }

  // usuń martwych
  S.zombies=S.zombies.filter(z=>!z.dead);

  // combo timeout
  if(S.comboT>0){ S.comboT-=dt; if(S.comboT<=0) S.combo=0; }

  // pickupy
  for(let i=S.pickups.length-1;i>=0;i--){
    S.pickups[i].t-=dt;
    if(S.pickups[i].t<=0) S.pickups.splice(i,1);
  }

  // spawnowanie fali
  if(S.state==='wave'){
    if(S.queue.length){
      S.spawnT-=dt;
      if(S.spawnT<=0){
        spawnZombie(S.queue.shift());
        const base=Math.max(1.1,3.4-S.wave*0.16);
        S.spawnT=base*(0.6+rnd()*0.8);
      }
    } else if(!S.zombies.length){
      if(!S.endless && S.wave>=WIN_WAVE){ victory(); return; }
      S.state='prewave'; S.preT=7;
    }
    // wydarzenia losowe
    if(S.wave>=2){
      S.eventT-=dt;
      if(S.eventT<=0){ randomEvent(); S.eventT=35+rnd()*20; }
    }
  }

  // efekty
  for(let i=S.floaters.length-1;i>=0;i--){
    const f=S.floaters[i]; f.t-=dt; f.y-=30*dt;
    if(f.t<=0) S.floaters.splice(i,1);
  }
  for(let i=S.particles.length-1;i>=0;i--){
    const p=S.particles[i]; p.t-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=200*dt;
    if(p.t<=0) S.particles.splice(i,1);
  }
  for(let i=S.zaps.length-1;i>=0;i--){
    S.zaps[i].t-=dt;
    if(S.zaps[i].t<=0) S.zaps.splice(i,1);
  }
  for(let i=S.rings.length-1;i>=0;i--){
    const rg=S.rings[i];
    rg.t-=dt; rg.r+=(rg.max-8)*dt/rg.T;
    if(rg.t<=0) S.rings.splice(i,1);
  }
  if(S.banner){ S.banner.t-=dt; if(S.banner.t<=0) S.banner=null; }
}

// ====== RYSOWANIE ======
function draw(tNow){
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(bgCanvas,0,0);
  if(!S) return;

  // podświetlenie i podgląd sadzenia
  if(S.selected&&S.mouse.x>=GX){
    const c=Math.floor((S.mouse.x-GX)/CW), r=Math.floor(S.mouse.y/CH);
    if(c>=0&&c<COLS&&r>=0&&r<ROWS){
      const free=!S.grid[r][c];
      ctx.fillStyle=free?'rgba(255,255,255,.18)':'rgba(255,80,60,.18)';
      ctx.fillRect(GX+c*CW,r*CH,CW,CH);
      if(free){
        ctx.save(); ctx.globalAlpha=0.55;
        ctx.translate(cellX(c),cellY(r));
        drawPlantArt(ctx,S.selected,tNow,null);
        ctx.restore();
      }
    }
  }

  // kosiarki
  for(const m of S.mowers){
    if(m.gone&&!m.active) continue;
    ctx.save();
    ctx.translate(m.x+20,cellY(m.row)+30);
    drawMowerArt(ctx,tNow,m.active);
    ctx.restore();
  }

  // rośliny
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const p=S.grid[r][c]; if(!p) continue;
    const x=cellX(c), y=cellY(r);
    ctx.save();
    ctx.translate(x,y);
    drawPlantArt(ctx,p.type,tNow+(r*31+c*17)*0.35,p);
    ctx.restore();
    if(p.hp<p.maxHp){
      ctx.fillStyle='rgba(40,0,0,.7)'; ctx.fillRect(x-22,y-44,44,5);
      ctx.fillStyle='#5eff6a'; ctx.fillRect(x-22,y-44,44*Math.max(0,p.hp/p.maxHp),5);
      ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=1; ctx.strokeRect(x-22,y-44,44,5);
    }
  }

  // zombie (sortowane rzędami, by niżsi zasłaniali wyższych)
  const zsorted=[...S.zombies].sort((a,b)=>a.row-b.row);
  for(const z of zsorted){
    const y=cellY(z.row);
    ctx.save();
    ctx.translate(z.x,y);
    drawZombieArt(ctx,tNow,z);
    ctx.restore();
    // pasek hp
    const boss=z.type==='boss';
    const bw=boss?70:40, by=y-(boss?72:48);
    ctx.fillStyle='rgba(40,0,0,.7)'; ctx.fillRect(z.x-bw/2,by,bw,5);
    ctx.fillStyle=z.slowT>0?'#7fd8ff':'#ff5c5c';
    ctx.fillRect(z.x-bw/2,by,bw*Math.max(0,z.hp/z.maxHp),5);
    ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=1; ctx.strokeRect(z.x-bw/2,by,bw,5);
  }

  // pociski z ogonem
  for(const pr of S.projectiles){
    const py=cellY(pr.row)-14;
    const r=pr.up?9:7;
    for(let i=1;i<=3;i++){
      ctx.globalAlpha=0.18-i*0.045;
      ctx.fillStyle=pr.ice?'#9fe0ff':'#a8e05a';
      ctx.beginPath(); ctx.arc(pr.x-i*11,py,r*(1-i*0.18),0,TAU); ctx.fill();
    }
    ctx.globalAlpha=1;
    const pg2=ctx.createRadialGradient(pr.x-2,py-2,1,pr.x,py,r);
    if(pr.ice){ pg2.addColorStop(0,'#f0fcff'); pg2.addColorStop(0.6,'#8fd7f2'); pg2.addColorStop(1,'#3d85a8'); }
    else { pg2.addColorStop(0,'#d8f5a2'); pg2.addColorStop(0.6,'#7cc242'); pg2.addColorStop(1,'#3c7f18'); }
    ctx.fillStyle=pg2;
    ctx.beginPath(); ctx.arc(pr.x,py,r,0,TAU); ctx.fill();
    if(pr.ice){
      ctx.strokeStyle='rgba(255,255,255,.8)'; ctx.lineWidth=1.4;
      ctx.beginPath();
      ctx.moveTo(pr.x-4,py); ctx.lineTo(pr.x+4,py);
      ctx.moveTo(pr.x,py-4); ctx.lineTo(pr.x,py+4);
      ctx.stroke();
    }
  }

  // błyskawice tesli (poświata + rdzeń)
  for(const zp of S.zaps){
    for(const pass of [[7,'rgba(120,210,255,.35)'],[2.2,'#eaffff']]){
      ctx.lineWidth=pass[0]; ctx.strokeStyle=pass[1]; ctx.lineCap='round';
      let px=zp.x0, py=zp.y0;
      for(const pt of zp.pts){
        ctx.beginPath(); ctx.moveTo(px,py);
        const mx=(px+pt.x)/2+(rnd()-.5)*18, my=(py+pt.y)/2+(rnd()-.5)*18;
        ctx.lineTo(mx,my); ctx.lineTo(pt.x,pt.y); ctx.stroke();
        px=pt.x; py=pt.y;
      }
    }
    ctx.lineWidth=1;
  }

  // pierścienie uderzeniowe
  for(const rg of S.rings){
    const a=Math.max(0,rg.t/rg.T);
    ctx.strokeStyle=rg.color+(a*0.8)+')';
    ctx.lineWidth=3+a*4;
    ctx.beginPath(); ctx.arc(rg.x,rg.y,rg.r,0,TAU); ctx.stroke();
  }
  ctx.lineWidth=1;

  // cząsteczki
  for(const p of S.particles){
    ctx.globalAlpha=Math.max(0,Math.min(1,p.t*2));
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r||3,0,TAU); ctx.fill();
  }
  ctx.globalAlpha=1;

  // power-upy
  for(const pk of S.pickups){
    if(pk.t<3&&Math.floor(pk.t*6)%2===0) continue; // miganie przed zniknięciem
    ctx.save();
    ctx.translate(pk.x,pk.y);
    drawPickupArt(ctx,tNow,pk.type);
    ctx.restore();
  }

  // słońca
  for(const s of S.suns){
    ctx.save();
    ctx.translate(s.x,s.y);
    drawSunArt(ctx,tNow+s.x,15,s.t<2?Math.max(0.25,s.t/2):1);
    ctx.restore();
  }

  // floatery
  for(const f of S.floaters){
    ctx.globalAlpha=Math.min(1,f.t*2);
    ctx.font='bold '+f.size+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.8)';
    ctx.strokeText(f.text,f.x,f.y);
    ctx.fillStyle=f.color; ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;

  // combo HUD
  if(S.combo>=2){
    ctx.font='bold 22px sans-serif'; ctx.textAlign='right'; ctx.textBaseline='alphabetic';
    ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,.85)';
    ctx.strokeText(`🔥 COMBO x${S.combo}`,W-15,30);
    ctx.fillStyle='#7cff5e'; ctx.fillText(`🔥 COMBO x${S.combo}`,W-15,30);
    ctx.textAlign='center';
  }
  // przeładowanie HUD
  if(S.overT>0){
    ctx.font='bold 16px sans-serif'; ctx.textAlign='right';
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.85)';
    ctx.strokeText(`⚡ ${Math.ceil(S.overT)}s`,W-15,54);
    ctx.fillStyle='#ffe95e'; ctx.fillText(`⚡ ${Math.ceil(S.overT)}s`,W-15,54);
    ctx.textAlign='center';
  }

  // banner z animacją "pop"
  if(S.banner){
    const age=2.6-S.banner.t;
    const scale=age<0.15?0.5+age/0.15*0.5:1;
    ctx.save();
    ctx.globalAlpha=Math.min(1,S.banner.t);
    ctx.translate(W/2,H/2-60);
    ctx.scale(scale,scale);
    ctx.font='bold 40px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=8; ctx.strokeStyle='rgba(0,0,0,.85)';
    ctx.strokeText(S.banner.text,0,0);
    ctx.fillStyle='#ffd94a'; ctx.fillText(S.banner.text,0,0);
    ctx.restore();
  }
  // odliczanie prewave
  if(S.state==='prewave'){
    ctx.font='bold 22px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=5; ctx.strokeStyle='rgba(0,0,0,.8)';
    ctx.strokeText(`Fala ${S.wave+1} za ${Math.ceil(S.preT)}s...`,W/2,40);
    ctx.fillStyle='#fff'; ctx.fillText(`Fala ${S.wave+1} za ${Math.ceil(S.preT)}s...`,W/2,40);
  }
}

// ====== UI DOM ======
function updateUI(){
  if(!S) return;
  document.getElementById('sunCount').textContent=S.sun;
  for(const key in cardEls){
    const el=cardEls[key], def=PLANTS[key];
    const cd=S.cds[key]||0;
    el.querySelector('.cd').style.height=cd>0?Math.min(100,(cd/def.cd)*100)+'%':'0%';
    el.classList.toggle('poor',S.sun<def.cost);
    el.classList.toggle('sel',S.selected===key);
  }
  shovelBtn.classList.toggle('sel',S.shovel);
  upBtn.classList.toggle('sel',S.upgrading);
  const wl=document.getElementById('waveLabel');
  if(S.wave===0) wl.textContent='Przygotowanie...';
  else wl.textContent=S.endless?`Fala ${S.wave} ♾️`:`Fala ${S.wave}/${WIN_WAVE}`;
  const prog=S.totalWave>0?Math.min(100,(S.killedWave/S.totalWave)*100):0;
  document.getElementById('waveBar').style.width=prog+'%';
  document.getElementById('killLabel').textContent='☠️ '+S.kills;
}

// ====== PĘTLA ======
let lastT=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-lastT)/1000);
  lastT=now;
  update(dt);
  draw(now/1000);
  updateUI();
  requestAnimationFrame(loop);
}
showMenu();
requestAnimationFrame(loop);
</script>
